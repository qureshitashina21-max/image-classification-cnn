<!DOCTYPE html>
<html>
<head>
    <title>Dog vs Cat Classifier</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
body {
    font-family: 'Poppins', sans-serif;
    background: url("/static/bg.jpg") no-repeat center center/cover;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

body::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: 0;
}

.container {
    position: relative;
    z-index: 1;
}
        .layout {
            display: flex;
            width: 100%;
            height: 100vh;
        }



.main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

        .container {
            background: white;
            padding: 35px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 420px;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 40px;
            margin-bottom: 10px;
        }

        h1 {
            margin: 5px 0;
            font-weight: 700;
        }
.header {
    position: absolute;
    top: 20px;
    left: 30px;
    color: white;

}


.header h2 {
    margin: 0;
    font-weight: 700;
    font-size: 28px;   /* 🔥 increased size */
	color: #62a379;
}
.header p {
    margin: 5px 0 0;
    font-size: 13px;
    opacity: 0.9;
}

.top-right {
    position: absolute;
    top: 20px;
    right: 30px;
}

.top-right a {
    text-decoration: none;
    background: white;
    color: #11998e;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    transition: 0.3s;
}

.top-right a:hover {
    background: #eee;
}

.footer-fixed {
    position: absolute;
    bottom: 15px;
    right: 25px;
    color: white;
    font-size: 13px;
    opacity: 0.9;
}

        .subtitle {
            color: gray;
            font-size: 14px;
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        img {
            margin-top: 20px;
            width: 220px;
            border-radius: 10px;
            animation: fadeIn 0.8s ease-in-out;
        }

        .prediction {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
        }

        .dog {
            color: green;
        }

        .cat {
            color: orange;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
        }

    </style>
</head>

<body>
<div class="layout">

    <!-- LEFT SIDEBAR -->
    <div class="header">
    <h2>🐶🐱 PetVision AI</h2>
    <p>AI-powered Dog vs Cat image classifier using CNN & Flask</p>
</div>

<div class="top-right">
    <a href="qureshitashina21-max ·
t" target="_blank">Get More Projects</a>
</div>
<div class="footer-fixed">
    Created by Tashina 🚀
</div>

    <!-- MAIN CONTENT -->
    <div class="main">
        <div class="container">

            <div class="logo">🐶🐱</div>
            <h1>Dog vs Cat Classifier</h1>

            <div class="subtitle">
                Upload an image and let AI predict
            </div>

            <form method="POST" enctype="multipart/form-data">
                <input type="file" name="file" required><br>
                <button type="submit">Predict</button>
            </form>

            {% if prediction %}
                <div class="prediction 
                    {% if 'Dog' in prediction %}dog{% else %}cat{% endif %}">
                    {{ prediction }}
                </div>

                <img src="{{ img_path }}">
            {% endif %}

            <div class="footer">
                Powered by CNN + Flask
            </div>

        </div>
    </div>

</div>

</body>
</html>
